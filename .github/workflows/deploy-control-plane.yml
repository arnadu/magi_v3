name: Deploy control plane

on:
  push:
    branches: [main]
    paths:
      - 'packages/control-plane/**'
      - 'packages/agent-config/**'
      - 'tsconfig.base.json'
      - 'fly.control-dev.toml'

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config fly.control-dev.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

  # Uncomment when production environment is ready.
