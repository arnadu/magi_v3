name: Deploy control plane

on:
  push:
    branches: [main]
    paths:
      - 'packages/control-plane/**'
      - 'packages/agent-config/**'
      - 'packages/agent-runtime-worker/**'
      - 'tsconfig.base.json'
      - 'fly.control-dev.toml'

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate with Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

      - name: Build and push control plane image
        run: |
          docker build \
            -f packages/control-plane/Dockerfile \
            -t registry.fly.io/magi-control-dev:latest \
            -t registry.fly.io/magi-control-dev:${{ github.sha }} \
            .
          docker push registry.fly.io/magi-control-dev:latest
          docker push registry.fly.io/magi-control-dev:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

      - name: Deploy to Fly.io
        run: flyctl deploy --config fly.control-dev.toml --image registry.fly.io/magi-control-dev:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

