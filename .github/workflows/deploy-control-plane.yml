name: Deploy control plane

on:
  push:
    branches: [main]
    paths:
      - 'packages/control-plane/**'
      - 'packages/agent-config/**'
      - 'packages/agent-runtime-worker/**'
      - 'packages/cockpit/**'
      - 'tsconfig.base.json'
      - 'fly.control-dev.toml'
  workflow_dispatch: {}

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The cockpit (Vite/React) is built here, not in the Dockerfile: its build
      # output is gitignored, not committed, so the image must always get a
      # fresh bundle from current source. Building it in-image would need a
      # normal `npm install` (esbuild's postinstall needs scripts), which
      # conflicts with the Dockerfile's `npm ci --ignore-scripts` used for the
      # backend packages — doing it here in CI sidesteps that entirely.
      - name: Build cockpit
        run: |
          npm ci
          npm run build -w @magi/cockpit

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate with Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

      - name: Build and push control plane image
        run: |
          docker build \
            -f packages/control-plane/Dockerfile \
            -t registry.fly.io/magi-control-dev:latest \
            -t registry.fly.io/magi-control-dev:${{ github.sha }} \
            .
          docker push registry.fly.io/magi-control-dev:latest
          docker push registry.fly.io/magi-control-dev:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

      - name: Deploy to Fly.io
        run: flyctl deploy --config fly.control-dev.toml --image registry.fly.io/magi-control-dev:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

  # Uncomment when production environment is ready.
