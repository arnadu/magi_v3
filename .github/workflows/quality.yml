name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (Biome)
        run: npm run lint

      - name: Unit tests
        run: npm test

  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    # Skip on Dependabot PRs — semgrep can't access secrets there
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Scan packages/
        run: semgrep scan --config p/default packages/ --error --quiet
