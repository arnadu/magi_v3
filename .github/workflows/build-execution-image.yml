name: Build execution plane image

on:
  push:
    branches: [main]
    paths:
      - 'packages/agent-runtime-worker/**'
      - 'packages/agent-config/**'
      - 'packages/skills/**'
      - 'config/**'

jobs:
  build-dev:
    name: Build & push (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate with Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

      - name: Build and push image
        run: |
          docker build \
            -f packages/agent-runtime-worker/Dockerfile \
            -t registry.fly.io/magi-missions-dev:latest \
            -t registry.fly.io/magi-missions-dev:${{ github.sha }} \
            .
          docker push registry.fly.io/magi-missions-dev:latest
          docker push registry.fly.io/magi-missions-dev:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

      # Remove the image override so the control plane uses :latest from now on.
      - name: Clear image pin on control plane
        run: flyctl secrets unset FLY_MISSIONS_IMAGE --app magi-control-dev || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CI }}

