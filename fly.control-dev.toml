app = "magi-control-dev"
primary_region = "iad"

[build]
  dockerfile = "packages/control-plane/Dockerfile"
  # Build context is the repo root (this file must stay at the repo root).

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # always-on control plane
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
