<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MAGI Monitor</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="light">

<header>
  <span class="dot" id="dot"></span>
  <span class="hname" id="hname">MAGI</span>
  <span class="hmeta" id="hmeta"></span>
  <span class="hcost" id="hcost">$0.0000</span>
  <span class="hup" id="hup"></span>
  <span class="spacer"></span>
  <button type="button" class="btn btn-compose" onclick="openCompose(null)">&#9993; Send</button>
  <button type="button" class="btn btn-step" id="step-btn" onclick="toggleStep()">Step &#9675;</button>
  <button type="button" class="btn btn-kill" id="kill-btn" onclick="killDaemon()">&#9632; Kill</button>
  <button type="button" class="btn btn-theme" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark theme">&#9788;</button>
</header>

<div class="budget-banner hidden" id="budget-banner">
  <span class="budget-icon">&#9888;</span>
  <span class="budget-msg" id="budget-msg">Spending cap reached — mission paused</span>
  <button type="button" class="btn btn-extend" id="extend-btn" onclick="extendBudget()">&#43;$5 and continue</button>
</div>

<div class="agent-error-banner hidden" id="agent-error-banner">
  <span class="ae-icon">&#10060;</span>
  <span class="ae-msg" id="ae-msg">Agent stopped</span>
  <span class="ae-hint" id="ae-hint"></span>
  <button type="button" class="btn btn-dismiss" onclick="hideAgentErrorBanner()">Dismiss</button>
  <button type="button" class="btn btn-resume hidden" id="ae-resume-btn">Resume</button>
</div>

<!-- Transient limit-alert toasts (soft = warning, hard = turn aborted) -->
<div id="limit-toasts" style="position:fixed;bottom:12px;right:12px;z-index:1000;display:flex;flex-direction:column;align-items:flex-end"></div>

<main>
  <!-- Left: thread list + chat + compose -->
  <div class="left-col">
    <div class="thread-list" id="thread-list">
      <div class="empty-state">Waiting for messages&#8230;</div>
    </div>
    <div class="chat-view" id="chat-view">
      <div class="empty-state">Select a thread</div>
    </div>
    <div class="compose-bar" id="compose-bar">
      <div class="compose-recipients" id="compose-recipients">
        <!-- recipient chips populated by app.js -->
      </div>
      <div class="compose-input-row">
        <textarea id="compose-body" placeholder="Message&#8230;" rows="2"></textarea>
        <button type="button" class="btn btn-send" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <div class="panel-resize-handle" id="panel-resize-handle"></div>

  <!-- Right: agent tabs + content tabs + detail pane -->
  <div class="right-col">
    <div class="agent-tabs" id="agent-tabs">
      <!-- per-agent tabs + Mission tab, populated by app.js -->
    </div>
    <div class="content-tabs" id="content-tabs">
      <!-- Activity | Mental Map | Files  OR  Schedule | Files | Log | Stats -->
    </div>
    <div class="detail-pane" id="detail-pane">
      <div class="empty-state">Select an agent or Mission above</div>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
